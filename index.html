<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veg Profit Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-4">  <div class="max-w-xl mx-auto">
    <h1 class="text-2xl font-bold mb-4 text-center">🥦 Veg Profit Tracker</h1><div class="bg-gray-800 p-4 rounded-2xl shadow-lg">
  <label class="block mb-2">Vegetable Name</label>
  <input id="name" class="w-full p-2 rounded text-black mb-3" placeholder="e.g. Tomato">

  <label class="block mb-2">Buying Price (₹ per kg)</label>
  <input id="buy" type="number" class="w-full p-2 rounded text-black mb-3">

  <label class="block mb-2">Selling Price (₹ per kg)</label>
  <input id="sell" type="number" class="w-full p-2 rounded text-black mb-3">

  <label class="block mb-2">Quantity Sold (kg)</label>
  <input id="qty" type="number" class="w-full p-2 rounded text-black mb-3">

  <button onclick="calculate()" class="w-full bg-green-500 hover:bg-green-600 p-2 rounded-xl font-bold">Calculate Profit</button>
</div>

<div id="result" class="mt-4 text-center text-lg"></div>

<div class="mt-6 bg-gray-800 p-4 rounded-2xl">
  <h2 class="text-xl font-bold mb-2">💡 Smart Suggestions</h2>
  <ul class="list-disc ml-5 text-sm">
    <li>Sell coriander & chilli for high margin</li>
    <li>Keep potato, onion, tomato for daily customers</li>
    <li>Buy early morning from mandi</li>
    <li>Fresh display = higher price</li>
  </ul>
</div>

  </div>  <script>
    function calculate() {
      let name = document.getElementById('name').value;
      let buy = parseFloat(document.getElementById('buy').value);
      let sell = parseFloat(document.getElementById('sell').value);
      let qty = parseFloat(document.getElementById('qty').value);

      if (!name || isNaN(buy) || isNaN(sell) || isNaN(qty)) {
        document.getElementById('result').innerHTML = "⚠️ Please fill all fields";
        return;
      }

      let profitPerKg = sell - buy;
      let totalProfit = profitPerKg * qty;

      document.getElementById('result').innerHTML = `
        <div class="bg-gray-800 p-4 rounded-2xl">
          <p>📦 Item: <b>${name}</b></p>
          <p>💰 Profit per kg: ₹${profitPerKg}</p>
          <p>📈 Total Profit: <b class="text-green-400">₹${totalProfit}</b></p>
        </div>
      `;
    }
  </script></body>
</html>
